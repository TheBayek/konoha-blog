<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Récupération - Konoha</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="enregistrement.css" />
    <link rel="icon" type="image/jpeg" href="telechargement.jpg" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="enregistrement.html" class="nav-link active">Mon Profil</a>
      <a href="https://gaming.konohablog.fr" class="nav-link arcade-link">
  <span class="icone-manette">🎮</span> ARCADE
</a>
    </nav>

    <div class="login-container">
      <h2>🦅 ROULEAU DE SECOURS</h2>
      <p>Entre ton adresse email. L'Anbu t'enverra un lien secret pour réinitialiser ton mot de passe.</p>

      <input
        type="email"
        id="recup-email"
        class="input-konoha"
        placeholder="Ton email ninja..."
      />

      <button onclick="demanderRecuperation()" class="btn-login">
        ENVOYER LE PIGEON VOYAGEUR
      </button>

      <div class="mot-de-passe-oublie">
        <a href="enregistrement.html">⬅️ Retour à la connexion</a>
      </div>
    </div>

    <script>
      async function demanderRecuperation() {
        let email = document.getElementById("recup-email").value.trim();

        if (!email) {
          alert("❌ Il faut renseigner ton email pour qu'on puisse t'aider !");
          return;
        }

        try {
          // ⚠️ Cette route n'existe pas encore sur le serveur, on la fera à l'étape 3 !
          // On pointe vers TON pc (localhost) le temps du test !
const response = await fetch("https://api.konohablog.fr/api/mot-de-passe-oublie", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
});

          const data = await response.json();

          if (response.ok) {
            alert("🦅 " + data.message);
          } else {
            alert("🛑 " + data.erreur);
          }
        } catch (err) {
          alert("❌ Impossible de joindre le bureau du Hokage (Serveur éteint) !");
        }
      }
    </script>
  </body>
</html>
