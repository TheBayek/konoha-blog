<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enregistrement - Konoha</title>
    <link rel="stylesheet" href="style.css?v=10"> <style>
        .login-container {
            background-color: rgba(0, 0, 0, 0.85); /* La boîte noire transparente */
            border: 3px solid #ff9900;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            margin: 40px auto; 
            padding: 40px 30px;
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.5);
            display: flex; 
            flex-direction: column; /* Empile les éléments de haut en bas ! */
            align-items: center; 
            text-align: center;
        }

        .login-container h2 {
            color: #ff9900;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 10px;
            font-family: 'Bangers', cursive;
        }

        .login-container p {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-family: sans-serif;
        }

        .input-konoha {
            width: 100%; 
            padding: 15px;
            margin-bottom: 20px; 
            background-color: #222;
            border: 2px solid #555;
            border-radius: 8px;
            color: white;
            font-family: 'Bangers', cursive;
            font-size: 1.2rem;
            box-sizing: border-box; 
        }

        .input-konoha:focus {
            outline: none;
            border-color: #ff9900;
            box-shadow: 0 0 10px #ff9900;
        }

        .btn-login {
            width: 100%; 
            background-color: #ff9900;
            color: black;
            border: none;
            padding: 15px;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px; 
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: white;
            color: #ff9900;
            transform: scale(1.05);
            box-shadow: 0 0 15px white;
        }

        .mot-de-passe-oublie {
            margin-top: 10px;
            width: 100%;
        }

        /* Le lien orange pour créer un compte */
        .lien-orange {
            color: #ff9900 !important;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            text-decoration: none;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .lien-orange:hover {
            color: white !important;
            text-shadow: 0 0 10px #ff9900;
        }

        /* Le lien piège discret */
        .lien-piege {
            color: #666 !important;
            font-family: sans-serif;
            font-size: 0.9rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .lien-piege:hover {
            color: #ff00ff !important;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-link">Accueil</a>
        <a href="enregistrement.html" class="nav-link active">Compte</a>
    </nav>

    <div class="login-container">
        <h2>📜 ENREGISTREMENT NINJA</h2>
        <p>Identifie-toi pour entrer dans les archives de Konoha.</p>
        
        <input type="text" id="login-pseudo" class="input-konoha" placeholder="Nom du Shinobi...">
        <input type="password" id="login-pass" class="input-konoha" placeholder="Code Secret...">
        
        <button onclick="connexionNinja()" class="btn-login">OUVRIR LES PORTES DE KONOHA</button>
        
        <div class="mot-de-passe-oublie">
            <a href="creation-compte.html" class="lien-orange">Vous n'avez pas de compte ? Créez-en un !</a>
        </div>

        <div class="mot-de-passe-oublie" style="margin-top: 15px;">
            <a href="#" class="lien-piege" onclick="window.location.href='https://thebayek.github.io/UWU/'">Code secret oublié ?</a>
        </div>
    </div>

    <script>
        async function connexionNinja() {
    let pseudo = document.getElementById("login-pseudo").value.trim();
    let password = document.getElementById("login-pass").value;

    try {
        const response = await fetch('http://localhost:3000/api/connexion', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pseudo, password })
        });
        const data = await response.json();

        if (response.ok) {
            alert("✅ Bienvenue, " + data.ninja.pseudo + " !");
            // On sauvegarde en local pour que la page "mon-profil" affiche les bonnes infos
            localStorage.setItem("ninjaPseudo", data.ninja.pseudo);
            localStorage.setItem("ninjaAvatar", data.ninja.avatar);
            window.location.href = "mon-compte.html";
        } else {
            alert("🛑 " + data.erreur);
        }
    } catch (err) {
        alert("❌ Impossible de joindre le serveur !");
    }
}
    </script>
</body>
</html>
