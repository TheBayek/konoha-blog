<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enregistrement - Konoha</title>

    <link rel="stylesheet" href="style.css?v=10" />
    <link rel="stylesheet" href="enregistrement.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="enregistrement.html" class="nav-link active" id="nav-login"
        >Compte</a
      >
      <a
        href="mon-compte.html"
        class="nav-link"
        id="nav-profil"
        style="display: none"
        >Mon Compte</a
      >
    </nav>

    <div class="login-container">
      <h2>📜 ENREGISTREMENT NINJA</h2>
      <p>Identifie-toi pour entrer dans les archives de Konoha.</p>

      <input
        type="text"
        id="login-pseudo"
        class="input-konoha"
        placeholder="Nom du Shinobi..."
      />
      <input
        type="password"
        id="login-pass"
        class="input-konoha"
        placeholder="Code Secret..."
      />

      <button onclick="connexionNinja()" class="btn-login">
        OUVRIR LES PORTES DE KONOHA
      </button>

      <div class="mot-de-passe-oublie">
        <a
          href="creation-compte.html"
          style="
            color: #ff9900;
            font-family: &quot;Bangers&quot;, cursive;
            font-size: 1.2rem;
          "
          >Vous n'avez pas de compte ? Créez-en un !</a
        >
      </div>

      <div class="mot-de-passe-oublie">
        <a
          href="#"
          onclick="window.location.href = 'https://thebayek.github.io/UWU/'"
          >Code secret oublié ?</a
        >
      </div>
    </div>

    <script>
      async function connexionNinja() {
        let pseudo = document.getElementById("login-pseudo").value.trim();
        let password = document.getElementById("login-pass").value;

        try {
          const response = await fetch(
            "https://api.konohablog.fr/api/connexion",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ pseudo, password }),
            },
          );
          const data = await response.json();

          if (response.ok) {
            alert("✅ Bienvenue, " + data.ninja.pseudo + " !");
            localStorage.setItem("ninjaPseudo", data.ninja.pseudo);
            localStorage.setItem("ninjaAvatar", data.ninja.avatar);
            window.location.href = "mon-compte.html";
          } else {
            alert("🛑 " + data.erreur);
          }
        } catch (err) {
          alert("❌ Impossible de joindre le serveur !");
        }
      }

      // Le Jutsu de la Navbar
      let ninjaConnecte = localStorage.getItem("ninjaPseudo");
      if (ninjaConnecte) {
        document.getElementById("nav-login").style.display = "none";
        document.getElementById("nav-profil").style.display = "inline-block";
      }
    </script>
  </body>
</html>
