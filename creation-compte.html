<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Konoha</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="creation-compte.css"> 
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-link">Accueil</a>
        <a href="enregistrement.html" class="nav-link active">Compte</a>
    </nav>

    <div class="login-container">
        <h2>📝 CRÉATION DE COMPTE</h2>
        <p>Choisis ton avatar et ton nom de Ninja.</p>
        
        <input type="text" id="new-pseudo" class="input-konoha" placeholder="Choisis ton Pseudo...">
        <input type="password" id="new-pass" class="input-konoha" placeholder="Mot de passe secret...">
        
        <p style="margin-bottom: 5px; font-size: 0.9rem; width: 100%; text-align: left; color: #ccc;">Photo de profil (Optionnel, Max 2 Mo) :</p>
        <input type="file" id="avatar-upload" class="input-file-konoha" accept="image/*">
        
        <button onclick="creerLeCompte()" class="btn-login">CRÉER MON COMPTE</button>
        
        <a href="enregistrement.html" class="lien-retour">Retour à l'enregistrement</a>
    </div>

    <script>
       async function creerLeCompte() {
    let pseudo = document.getElementById("new-pseudo").value.trim();
    let password = document.getElementById("new-pass").value;
    let fileInput = document.getElementById("avatar-upload");

    if (!pseudo || !password) {
        alert("❌ Remplis tous les champs, ninja !");
        return;
    }

    let avatarBase64 = "telechargement.jpg"; // Image par défaut

    // On transforme l'image en texte si elle existe
    if (fileInput.files.length > 0) {
        const reader = new FileReader();
        reader.readAsDataURL(fileInput.files[0]);
        reader.onload = async () => {
            await envoyerInscription(pseudo, password, reader.result);
        };
    } else {
        await envoyerInscription(pseudo, password, avatarBase64);
    }
}

async function envoyerInscription(pseudo, password, avatar) {
    try {
        const response = await fetch('http://localhost:3000/api/inscription', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pseudo, password, avatar })
        });
        const data = await response.json();
        if (response.ok) {
            alert("✅ Compte créé !");
            localStorage.setItem("ninjaPseudo", pseudo.toLowerCase());
            window.location.href = "mon-compte.html";
        } else {
            alert("🛑 " + data.erreur);
        }
    } catch (err) {
        alert("❌ Serveur éteint !");
    }
}
    </script>
</body>
</html>
