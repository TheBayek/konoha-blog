<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer un compte - Konoha</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="creation-compte.css" />
    <link rel="icon" type="image/jpeg" href="telechargement.jpg" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="#" onclick="allerAuProfil(event)" class="nav-link">MON PROFIL</a>
      <a href="https://gaming.konohablog.fr" class="nav-link arcade-link">
  <span class="icone-manette">🎮</span> ARCADE
</a>
    </nav>

    <div class="login-container">
      <h2>📝 CRÉATION DE COMPTE</h2>
      <p>Choisis ton avatar et ton nom de Ninja.</p>

     <input
        type="text"
        id="new-pseudo"
        class="input-konoha"
        placeholder="Choisis ton Pseudo..."
      />
      <input
        type="email"
        id="new-email"
        class="input-konoha"
        placeholder="Ton adresse email secrète..."
      />
      <input
        type="password"
        id="new-pass"
        class="input-konoha"
        placeholder="Mot de passe secret..."
      />

      <p
        style="
          margin-bottom: 5px;
          font-size: 0.9rem;
          width: 100%;
          text-align: left;
          color: #ccc;
        "
      >
        Photo de profil (Optionnel, Max 2 Mo) :
      </p>
      <input
        type="file"
        id="avatar-upload"
        class="input-file-konoha"
        accept="image/*"
      />

      <button onclick="creerLeCompte()" class="btn-login">
        CRÉER MON COMPTE
      </button>

      <a href="enregistrement.html" class="lien-retour"
        >Retour à l'enregistrement</a
      >
    </div>

    <script>
      async function creerLeCompte() {
        let pseudo = document.getElementById("new-pseudo").value.trim();
        let email = document.getElementById("new-email").value.trim(); // ⬅️ On capte l'email
        let password = document.getElementById("new-pass").value;
        let fileInput = document.getElementById("avatar-upload");

        // ⬅️ On vérifie que les 3 champs sont remplis
        if (!pseudo || !email || !password) {
          alert("❌ Remplis tous les champs (pseudo, email, mot de passe) !");
          return;
        }

        let avatarBase64 = "telechargement.jpg"; 

        if (fileInput.files.length > 0) {
          const reader = new FileReader();
          reader.readAsDataURL(fileInput.files[0]);
          reader.onload = async () => {
            await envoyerInscription(pseudo, email, password, reader.result);
          };
        } else {
          await envoyerInscription(pseudo, email, password, avatarBase64);
        }
      }

      // ⬅️ On ajoute l'email dans les paramètres de la fonction
      async function envoyerInscription(pseudo, email, password, avatar) {
        try {
          const response = await fetch("https://api.konohablog.fr/api/inscription", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              // ⬅️ On ajoute l'email dans le colis envoyé au serveur
              body: JSON.stringify({ pseudo, email, password, avatar }),
            }
          );
          const data = await response.json();
          if (response.ok) {
            alert("✅ Compte créé avec succès !");
            localStorage.setItem("ninjaPseudo", pseudo.toLowerCase());
            window.location.href = "mon-compte.html";
          } else {
            alert("🛑 " + data.erreur);
          }
        } catch (err) {
          alert("❌ Serveur éteint !");
        }
      }
    </script>
  </body>
</html>
