<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Profil Ninja</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mon-compte.css" />
    <link rel="icon" type="image/jpeg" href="telechargement.jpg" />
  </head>
  <body>
    <nav class="navbar">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="mon-compte.html" class="nav-link active">Mon Profil</a>
    </nav>
    <div class="profil-carte">
      <img id="affichage-avatar" src="" alt="Mon Avatar" class="avatar-img" />
      <div style="margin-bottom: 20px;">
        <label for="input-avatar" style="cursor: pointer; background-color: #ff9900; color: black; padding: 8px 15px; border-radius: 5px; font-family: 'Bangers', cursive; font-size: 1.1rem; transition: 0.3s;">
            📷 CHANGER D'AVATAR
        </label>
        <input type="file" id="input-avatar" accept="image/*" style="display: none;" onchange="changerAvatar(event)">
      </div>

      

      <h2 id="affichage-pseudo">Nom Inconnu</h2>

      <p>Niveau actuel : <strong id="affichage-grade">...</strong></p>
<p>Série de connexions : <span id="affichage-streak">0</span>🔥 jours</p>

      <div style="margin-top: 20px; border-top: 2px solid #333; padding-top: 20px; width: 100%;">
        
        <button id="btn-toggle-parametres" onclick="toggleParametres()" style="background-color: transparent; color: #ff9900; border: 2px solid #ff9900; padding: 10px; border-radius: 5px; font-family: 'Bangers', cursive; font-size: 1.2rem; cursor: pointer; transition: 0.3s; width: 90%; margin-bottom: 10px;">
          ⚙️ OUVRIR LES PARAMÈTRES SECRETS
        </button>

        <div id="zone-parametres" style="display: none; width: 100%; margin-top: 15px;">
          <input type="text" id="modif-pseudo" placeholder="Nouveau pseudo..." style="width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #222; color: white; border: 1px solid #555; font-family: 'Bangers', cursive; font-size: 1.1rem; box-sizing: border-box;">
          
          <input type="password" id="modif-password" placeholder="Nouveau mot de passe..." style="width: 90%; padding: 10px; margin-bottom: 15px; border-radius: 5px; background: #222; color: white; border: 1px solid #555; font-family: 'Bangers', cursive; font-size: 1.1rem; box-sizing: border-box;">
          
          <button onclick="changerIdentifiants()" style="background-color: #ff9900; color: black; padding: 10px; border-radius: 5px; font-family: 'Bangers', cursive; font-size: 1.2rem; cursor: pointer; border: none; transition: 0.3s; width: 90%; margin-bottom: 10px;">
            SAUVEGARDER
          </button>
        </div>

      </div>

      <button onclick="deconnexion()" class="btn-deconnexion">
        SE DÉCONNECTER
      </button>
    </div>
    <script>
      // 1. On vérifie qui est connecté (le badge d'accès)
      let pseudoLocal = localStorage.getItem("ninjaPseudo");

      // 2. Si le mec n'a pas de compte, on le renvoie à la porte d'entrée !
      if (!pseudoLocal) {
        alert("🛑 Halte-là ! Tu dois d'abord t'enregistrer.");
        window.location.href = "enregistrement.html";
      } else {
        // 3. LE JUTSU : On interroge le vrai serveur pour avoir les vraies infos !
        chargerProfilNinja(pseudoLocal);
      }

      async function chargerProfilNinja(pseudo) {
        try {
          // On ajoute le chemin exact et le pseudo du ninja
          const response = await fetch(
            `https://api.konohablog.fr/api/profil/${pseudo}`,
          );
          const data = await response.json();

          if (response.ok) {
            // On affiche les infos qui viennent de MongoDB
            document.getElementById("affichage-pseudo").textContent =
              data.pseudo;
            document.getElementById("affichage-avatar").src =
              data.avatar || "telechargement.jpg";
          } else {
            document.getElementById("affichage-pseudo").textContent =
              "Ninja introuvable";
          }
        } catch (err) {
          console.log("Serveur backend éteint. Mode survie activé.");
          // Si ton serveur Node est coupé, on affiche au moins le pseudo local
          document.getElementById("affichage-pseudo").textContent = pseudo;
        }
      }

      // 4. La fonction pour se déconnecter (inchangée, elle était parfaite)
      function deconnexion() {
        localStorage.removeItem("ninjaPseudo");
        localStorage.removeItem("ninjaAvatar");
        alert("💨 Déconnexion réussie ! (Technique de permutation)");
        window.location.href = "index.html";
      }

      async function changerAvatar(event) {
        let fichier = event.target.files[0];
        let pseudo = localStorage.getItem("ninjaPseudo");

        if (fichier && pseudo) {
          let reader = new FileReader();

          reader.onload = async function (e) {
            let nouvelleImage = e.target.result; // L'image en Base64

            // 1. On change l'image direct sur la page pour que ça fasse stylé
            document.getElementById("affichage-avatar").src = nouvelleImage;

            // 2. On l'envoie à MongoDB via notre nouvelle route
            try {
              const response = await fetch(
                "https://api.konohablog.fr/api/profil/avatar",
                {
                  method: "PUT",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    pseudo: pseudo,
                    avatar: nouvelleImage,
                  }),
                },
              );

              if (response.ok) {
                // On met à jour la poche du ninja
                localStorage.setItem("ninjaAvatar", nouvelleImage);
                alert(
                  "📸 Nouvel avatar sauvegardé dans les archives de Konoha !",
                );
              } else {
                alert("🛑 Erreur : L'avatar n'a pas pu être sauvegardé.");
              }
            } catch (err) {
              alert("❌ Impossible de joindre le serveur !");
            }
          };

          reader.readAsDataURL(fichier); // Déclenche la lecture du fichier
        }
      }

      async function changerIdentifiants() {
        let ancienPseudo = localStorage.getItem("ninjaPseudo");
        let nouveauPseudo = document.getElementById("modif-pseudo").value.trim();
        let nouveauPassword = document.getElementById("modif-password").value;

        // Si le mec clique sans rien remplir
        if (!nouveauPseudo && !nouveauPassword) {
          alert("⚠️ Remplis au moins un champ pour modifier quelque chose !");
          return;
        }

        try {
          const response = await fetch('https://api.konohablog.fr/api/profil/identifiants', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ancienPseudo, nouveauPseudo, nouveauPassword })
          });

          const data = await response.json();

          if (response.ok) {
            alert("✅ " + data.message);
            
            // LE JUTSU EST LÀ : On met à jour la poche avec le nouveau pseudo !
            localStorage.setItem("ninjaPseudo", data.ninja.pseudo);
            
            // On rafraîchit la page pour tout remettre à zéro proprement
            window.location.reload();
          } else {
            alert("🛑 " + data.erreur);
          }
        } catch (err) {
          alert("❌ Impossible de joindre le serveur !");
        }
      }
      // Le Jutsu pour afficher ou cacher le menu des paramètres
      function toggleParametres() {
        let zone = document.getElementById("zone-parametres");
        let btn = document.getElementById("btn-toggle-parametres");

        // Si la zone est cachée, on l'affiche et on change le bouton en rouge
        if (zone.style.display === "none") {
          zone.style.display = "block";
          btn.innerHTML = "❌ FERMER LES PARAMÈTRES";
          btn.style.color = "#ff3333";
          btn.style.borderColor = "#ff3333";
        } 
        // Si elle est visible, on la recache et on remet le bouton en orange
        else {
          zone.style.display = "none";
          btn.innerHTML = "⚙️ OUVRIR LES PARAMÈTRES SECRETS";
          btn.style.color = "#ff9900";
          btn.style.borderColor = "#ff9900";
        }
      }

      document.getElementById("affichage-grade").innerText = data.ninja.grade;
document.getElementById("affichage-streak").innerText = data.ninja.streak;
    </script>
  </body>
</html>
